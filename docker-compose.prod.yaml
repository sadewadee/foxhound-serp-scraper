services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=serp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-serp_scraper}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --save 60 1 --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  manager:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:main
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - API_SECRET=${API_SECRET}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD}
      - API_KEY=${API_KEY}
      - MORDIBOUNCER_SECRET=${MORDIBOUNCER_SECRET}
      - DOKPLOY_URL=${DOKPLOY_URL}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY}
      - TZ=Asia/Jakarta
    ports:
      - "8080:8080"
      - "9090:9090"
    command: ["run"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  worker-contact-1:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:main
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MORDIBOUNCER_SECRET=${MORDIBOUNCER_SECRET}
      - TZ=Asia/Jakarta
    command: ["run", "-stage", "contact", "-workers", "20"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  worker-contact-2:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:main
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MORDIBOUNCER_SECRET=${MORDIBOUNCER_SECRET}
      - TZ=Asia/Jakarta
    command: ["run", "-stage", "contact", "-workers", "20"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  worker-website:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:main
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TZ=Asia/Jakarta
    command: ["run", "-stage", "website", "-workers", "10"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  worker-serp:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:main
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TZ=Asia/Jakarta
    command: ["run", "-stage", "serp", "-workers", "2"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

volumes:
  pg_data:
  redis_data:
