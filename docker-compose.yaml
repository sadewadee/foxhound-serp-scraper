# docker-compose.yaml — Server A (Central)
#
# Full stack: PostgreSQL + Redis + serp-scraper manager
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#
# Dokploy: set compose file to docker-compose.yaml, env vars via panel.

services:

  # ── PostgreSQL ──
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: serp
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-serp_scraper}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serp -d ${POSTGRES_DB:-serp_scraper}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    ports:
      - "${PG_PORT:-127.0.0.1:5432}:5432"

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --save 60 1
      --loglevel warning
      --maxmemory ${REDIS_MAXMEM:-256mb}
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"

  # ── Manager (all stages + API) ──
  manager:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      API_SECRET: "${API_SECRET}"
      API_ADMIN_PASSWORD: "${API_ADMIN_PASSWORD:-admin}"
      API_KEY: "${API_KEY:-}"
      MORDIBOUNCER_API_URL: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      PROXY_URL: "${PROXY_URL:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    volumes:
      - scraper_data:/data
    shm_size: "256mb"
    ports:
      - "${API_PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: ["run"]
    networks:
      - internal
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: ${MANAGER_MEMORY:-2g}

volumes:
  pg_data:
  redis_data:
  scraper_data:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network
