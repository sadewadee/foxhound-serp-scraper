# docker-compose.yaml — Server A (Central)
#
# Runs the full stack on a single machine:
#   db       — PostgreSQL 15 (persistent data)
#   redis    — Redis 7 (dedup + queue)
#   manager  — serp-scraper run (all pipeline stages)
#
# Dokploy-compatible: joins the external "dokploy-network" so this stack
# can be managed and reverse-proxied by a Dokploy control plane.
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#
# Required environment variables (set in .env or Dokploy env panel):
#   POSTGRES_PASSWORD        — PG superuser password (no default, must be set)
#   POSTGRES_DB              — Database name (default: serp_scraper)
#   REDIS_PASSWORD           — Redis password (default: empty)
#   API_SECRET               — HTTP API bearer token secret
#   API_ADMIN_PASSWORD       — Admin password for the HTTP API
#   API_KEY                  — API key for programmatic access
#   MORDIBOUNCER_API_URL     — Email validation API URL (optional)
#   MORDIBOUNCER_SECRET      — Email validation API secret (optional)
#   PROXY_URL                — HTTP/SOCKS5 proxy URL (optional)

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: serp
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-serp_scraper}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serp -d ${POSTGRES_DB:-serp_scraper}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    # Not exposed externally — only the manager talks to PG.

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        ["CMD-SHELL",
         "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # serp-scraper manager (all pipeline stages)
  # ---------------------------------------------------------------------------
  manager:
    image: "${SERP_IMAGE:-ghcr.io/sadewadee/foxhound-serp-scraper:latest}"
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Postgres DSN — constructed from the db service credentials.
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      # Redis — use password only when REDIS_PASSWORD is set.
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      # API authentication.
      API_SECRET: "${API_SECRET:-serp-scraper-secret}"
      API_ADMIN_PASSWORD: "${API_ADMIN_PASSWORD:-admin}"
      API_KEY: "${API_KEY:-}"
      # Optional email validation.
      MORDIBOUNCER_API_URL: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      # Optional proxy.
      PROXY_URL: "${PROXY_URL:-}"
      # Timezone.
      TZ: "${TZ:-UTC}"
    # Mount a config override file; if the file does not exist the image's
    # built-in defaults apply (env vars still override yaml values).
    volumes:
      - ./config.yaml:/home/scraper/config.yaml:ro
      - scraper_data:/data
    # Shared memory for browser stability.
    shm_size: "256mb"
    ports:
      - "${API_PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: ["run"]
    networks:
      - internal
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: "${MANAGER_MEMORY_LIMIT:-2g}"

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  scraper_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
  # External network created by Dokploy — attach only when deploying via Dokploy.
  # Remove this block (or set COMPOSE_PROFILES) when running without Dokploy.
  dokploy-network:
    external: true
    name: dokploy-network
