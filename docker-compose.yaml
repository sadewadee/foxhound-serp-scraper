# docker-compose.yaml — Dokploy / Single-server deployment
#
# Full stack: PostgreSQL + Redis + Manager (API) + Workers
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#
# Dokploy: set compose file to docker-compose.yaml, env vars via panel.

services:

  # ── PostgreSQL ──
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: serp
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-serp_scraper}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serp -d ${POSTGRES_DB:-serp_scraper}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --save 60 1
      --loglevel warning
      --maxmemory ${REDIS_MAXMEM:-256mb}
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal

  # ── Manager (API only, no scraping) ──
  manager:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      API_SECRET: "${API_SECRET}"
      API_ADMIN_PASSWORD: "${API_ADMIN_PASSWORD:-admin}"
      API_KEY: "${API_KEY:-}"
      DOKPLOY_URL: "${DOKPLOY_URL:-}"
      DOKPLOY_API_KEY: "${DOKPLOY_API_KEY:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: ["run", "-stage", "none"]
    networks:
      - internal
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: ${MANAGER_MEMORY:-1g}

  # ── SERP Worker (Google search via Camoufox browser) ──
  serp:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      PROXY_URL: "${PROXY_URL:-}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    shm_size: "512mb"
    command: ["run", "-stage", "serp", "-workers", "${SERP_WORKERS:-2}"]
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  # ── Enrich Worker (website crawl + contact extraction) ──
  enrich:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      PROXY_URL: "${PROXY_URL:-}"
      MORDIBOUNCER_API_URL: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    shm_size: "512mb"
    command: ["run", "-stage", "enrich", "-workers", "${ENRICH_WORKERS:-20}"]
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

volumes:
  pg_data:
  redis_data:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network
