# docker-compose.yaml — Production deployment
#
# Scaling:
#   SERP_WORKER_COUNT=2     → 2 SERP containers
#   ENRICH_WORKER_COUNT=4   → 4 Enrich containers
#   SERP_CONCURRENCY=4      → 4 browser tabs per SERP container
#   ENRICH_CONCURRENCY=20   → 20 concurrent fetchers per Enrich container

services:

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    command: >
      postgres
      -c max_connections=${PG_MAX_CONNECTIONS:-200}
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=8MB
      -c maintenance_work_mem=256MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02
      -c statement_timeout=60000
    shm_size: "1gb"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serp}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-serp_scraper}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scraper-network

  # ===========================================
  # Redis - Queue & Deduplication
  # ===========================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD}"
      --save 60 1
      --loglevel warning
      --maxmemory ${REDIS_MAXMEM:-2gb}
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scraper-network

  # ===========================================
  # Manager (API + Telegram bot, no scraping)
  # ===========================================
  manager:
    init: true
    build: .
    image: foxhound-serp-scraper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-serp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      API_SECRET: "${API_SECRET}"
      API_KEY: "${API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_ALLOWED_USERS: "${TELEGRAM_ALLOWED_USERS:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    command: ["run", "-stage", "none"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - scraper-network
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  # ===========================================
  # SERP Worker Pool (Google search via Camoufox)
  # ===========================================
  serp:
    init: true
    build: .
    image: foxhound-serp-scraper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-serp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      PROXY_URL: "${PROXY_URL:-}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      # ── DB pool (low — persistence only, jobs via Redis) ──
      PG_MAX_OPEN_CONNS: "${PG_MAX_OPEN_CONNS:-5}"
      PG_MAX_IDLE_CONNS: "${PG_MAX_IDLE_CONNS:-2}"
      # ── Browser lifecycle tuning (optional) ──
      PAGE_REUSE_LIMIT: "${PAGE_REUSE_LIMIT:-200}"
      BROWSER_REUSE_LIMIT: "${BROWSER_REUSE_LIMIT:-2}"
      SERP_MAX_REQUESTS: "${SERP_MAX_REQUESTS:-200}"
      BROWSER_TIMEOUT_SEC: "${BROWSER_TIMEOUT_SEC:-60}"
      RECONCILER_INTERVAL_MS: "${RECONCILER_INTERVAL_MS:-60000}"
      TZ: "${TZ:-Asia/Jakarta}"
    shm_size: "512mb"
    command: ["run", "-stage", "serp", "-workers", "${SERP_CONCURRENCY:-4}"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-healthy && test $(( $(date +%s) - $(stat -c %Y /tmp/worker-healthy) )) -lt 120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - scraper-network
    deploy:
      mode: replicated
      replicas: ${SERP_WORKER_COUNT:-2}
      resources:
        limits:
          cpus: "2"
          memory: 2g
        reservations:
          memory: 512m

  # ===========================================
  # Enrich Worker Pool (contact page discovery + extraction)
  # ===========================================
  enrich:
    init: true
    build: .
    image: foxhound-serp-scraper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-serp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      PROXY_URL: "${PROXY_URL:-}"
      MORDIBOUNCER_API_URL: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      # ── DB pool (low — persistence only, jobs via Redis) ──
      PG_MAX_OPEN_CONNS: "${PG_MAX_OPEN_CONNS:-5}"
      PG_MAX_IDLE_CONNS: "${PG_MAX_IDLE_CONNS:-2}"
      # ── Browser lifecycle tuning (optional) ──
      PAGE_REUSE_LIMIT: "${PAGE_REUSE_LIMIT:-200}"
      BROWSER_REUSE_LIMIT: "${BROWSER_REUSE_LIMIT:-2}"
      STEALTH_RECYCLE_AFTER: "${STEALTH_RECYCLE_AFTER:-500}"
      ENRICH_MAX_REQUESTS: "${ENRICH_MAX_REQUESTS:-300}"
      BROWSER_TIMEOUT_SEC: "${BROWSER_TIMEOUT_SEC:-60}"
      TZ: "${TZ:-Asia/Jakarta}"
    shm_size: "512mb"
    command: ["run", "-stage", "enrich", "-workers", "${ENRICH_CONCURRENCY:-20}"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-healthy && test $(( $(date +%s) - $(stat -c %Y /tmp/worker-healthy) )) -lt 120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - scraper-network
    deploy:
      mode: replicated
      replicas: ${ENRICH_WORKER_COUNT:-4}
      resources:
        limits:
          cpus: "1"
          memory: 2g
        reservations:
          memory: 512m

  # ===========================================
  # Autoheal - Auto-restart unhealthy containers
  # ===========================================
  autoheal:
    image: willfarrell/autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - scraper-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  scraper-network:
    driver: bridge
