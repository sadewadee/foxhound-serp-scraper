# docker-compose.yaml — Dokploy / Single-server deployment
#
# Full stack: PostgreSQL + Redis + Manager (API) + Workers
#
# Scaling:
#   SERP_WORKER_COUNT=2     → 2 SERP containers (each with SERP_CONCURRENCY tabs)
#   ENRICH_WORKER_COUNT=4   → 4 Enrich containers (each with ENRICH_CONCURRENCY fetchers)
#   SERP_CONCURRENCY=4      → 4 browser tabs per SERP container
#   ENRICH_CONCURRENCY=20   → 20 concurrent fetchers per Enrich container

services:

  # ── PostgreSQL ──
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: serp
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-serp_scraper}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serp -d ${POSTGRES_DB:-serp_scraper}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --save 60 1
      --loglevel warning
      --maxmemory ${REDIS_MAXMEM:-512mb}
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal

  # ── Manager (API + Telegram bot, no scraping) ──
  manager:
    init: true
    build: .
    image: foxhound-serp-scraper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      API_SECRET: "${API_SECRET}"
      API_ADMIN_PASSWORD: "${API_ADMIN_PASSWORD:-admin}"
      API_KEY: "${API_KEY:-}"
      DOKPLOY_URL: "${DOKPLOY_URL:-}"
      DOKPLOY_API_KEY: "${DOKPLOY_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_ALLOWED_USERS: "${TELEGRAM_ALLOWED_USERS:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: ["run", "-stage", "none"]
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: ${MANAGER_MEMORY:-1g}

  # ── SERP Worker Pool (Google search via Camoufox browser) ──
  serp:
    init: true
    build: .
    image: foxhound-serp-scraper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      PROXY_URL: "${PROXY_URL:-}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    shm_size: "512mb"
    command: ["run", "-stage", "serp", "-workers", "${SERP_CONCURRENCY:-4}"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-healthy && test $(( $(date +%s) - $(stat -c %Y /tmp/worker-healthy) )) -lt 120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: ${SERP_WORKER_COUNT:-2}
      resources:
        limits:
          cpus: "2"
          memory: 2g
        reservations:
          memory: 512m

  # ── Enrich Worker Pool (website crawl + contact extraction) ──
  enrich:
    init: true
    build: .
    image: foxhound-serp-scraper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://serp:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serp_scraper}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      PROXY_URL: "${PROXY_URL:-}"
      MORDIBOUNCER_API_URL: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"
      TZ: "${TZ:-Asia/Jakarta}"
    shm_size: "512mb"
    command: ["run", "-stage", "enrich", "-workers", "${ENRICH_CONCURRENCY:-20}"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-healthy && test $(( $(date +%s) - $(stat -c %Y /tmp/worker-healthy) )) -lt 120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: ${ENRICH_WORKER_COUNT:-4}
      resources:
        limits:
          cpus: "1"
          memory: 2g
        reservations:
          memory: 512m

volumes:
  pg_data:
  redis_data:

networks:
  internal:
    driver: bridge
