postgres:
  dsn: "${POSTGRES_DSN}"
  max_open_conns: 50
  max_idle_conns: 10

redis:
  addr: "${REDIS_ADDR:-localhost:6379}"
  password: "${REDIS_PASSWORD:-}"
  db: 0

serp:
  pages_per_query: 10
  results_per_page: 10
  delay_between_pages_ms: 5000
  delay_between_queries_ms: 30000
  concurrency: 4

website:
  concurrency: 5
  contact_pages: true
  timeout_ms: 20000

enrich:
  concurrency: 10
  timeout_ms: 15000
  validate_mx: false
  validate_email: false
  social_extraction: true

proxy:
  url: "${PROXY_URL}"

fetch:
  headless: true
  block_images: true
  page_reuse_limit: ${PAGE_REUSE_LIMIT:-200}
  browser_reuse_limit: ${BROWSER_REUSE_LIMIT:-2}
  stealth_recycle_after: ${STEALTH_RECYCLE_AFTER:-500}
  serp_max_requests: ${SERP_MAX_REQUESTS:-200}
  enrich_max_requests: ${ENRICH_MAX_REQUESTS:-300}
  browser_timeout_sec: ${BROWSER_TIMEOUT_SEC:-60}
  reconciler_interval_ms: ${RECONCILER_INTERVAL_MS:-60000}

mordibouncer:
  api_url: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
  secret: "${MORDIBOUNCER_SECRET}"

api:
  addr: ":8080"
  secret: "${API_SECRET:-serp-scraper-secret}"
  users:
    - username: admin
      api_key: "${API_KEY}"
      role: admin

monitor:
  enabled: true
  port: 9090
