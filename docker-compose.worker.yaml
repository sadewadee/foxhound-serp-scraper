# docker-compose.worker.yaml — Server B/C/D (Remote Worker)
#
# Connects to REMOTE PostgreSQL + Redis on Server A.
# No local database — stateless, all state lives in PG + Redis.
#
# Usage:
#   cp .env.worker.example .env
#   docker compose -f docker-compose.worker.yaml up -d
#
# Scale by running on multiple servers with different WORKER_STAGE/WORKER_COUNT.

services:

  worker:
    image: ghcr.io/sadewadee/foxhound-serp-scraper:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      # ── Required: remote PG + Redis ──
      POSTGRES_DSN: "${POSTGRES_DSN}"
      REDIS_ADDR: "${REDIS_ADDR}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

      # ── Worker config ──
      PROXY_URL: "${PROXY_URL:-}"
      TZ: "${TZ:-Asia/Jakarta}"

      # ── Email validation (optional) ──
      MORDIBOUNCER_API_URL: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-}"

    shm_size: "${SHM_SIZE:-512mb}"
    ports:
      - "${METRICS_PORT:-9091}:9090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command:
      - "run"
      - "-stage"
      - "${WORKER_STAGE:-contact}"
      - "-workers"
      - "${WORKER_COUNT:-20}"
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY:-1g}
