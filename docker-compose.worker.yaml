# docker-compose.worker.yaml — Standalone Worker
#
# Connects to REMOTE PostgreSQL + Redis. No local database.
# Deploy on any server, set env vars, done.
#
# Usage:
#   POSTGRES_DSN=postgres://serp:pass@main-server:5432/serp_scraper \
#   REDIS_ADDR=main-server:6379 \
#   REDIS_PASSWORD=pass \
#   WORKER_STAGE=serp \
#   WORKER_CONCURRENCY=2 \
#   docker compose -f docker-compose.worker.yaml up -d

services:
  worker:
    build: .
    image: foxhound-serp-scraper:local
    restart: unless-stopped
    environment:
      # ── Required: remote PG + Redis ──
      POSTGRES_DSN: "${POSTGRES_DSN}"
      REDIS_ADDR: "${REDIS_ADDR}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

      # ── Worker config ──
      PROXY_URL: "${PROXY_URL:-http://zafmahoi-rotate:uodfmly6phrl@p.webshar}"
      TZ: "${TZ:-Asia/Jakarta}"

      # ── Email validation (optional) ──
      MORDIBOUNCER_API_URL: "${MORDIBOUNCER_API_URL:-https://mailexchange.kremlit.dev}"
      MORDIBOUNCER_SECRET: "${MORDIBOUNCER_SECRET:-5b0231c5941b821b}"

    shm_size: "${SHM_SIZE:-512mb}"
    command: ["run", "-stage", "${WORKER_STAGE:-enrich}", "-workers", "${WORKER_CONCURRENCY:-4}"]
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY:-2g}
